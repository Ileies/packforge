# Beispiel: nginx vor PackForge (adapter-node).
# Anpassen: server_name, upstream-Host/Port, TLS-Zertifikate.
#
# Brotli: nur wenn nginx mit ngx_brotli gebaut wurde — sonst reicht gzip.
#
# HTTP/2: Client ↔ nginx (multiplexing). Upstream bleibt HTTP/1.1 (s. proxy_http_version).
# Ab nginx 1.25.1 alternativ: listen 443 ssl; http2 on;
#
# HTTP/3 (QUIC): nur mit passendem nginx-Build; z. B. ergänzend zu TLS:
#   listen 443 quic reuseport;
#   http3 on;
#   add_header Alt-Svc 'h3=":443"; ma=86400' always;
# (Details und ssl_early_data je nach nginx-Version / Security-Review.)
#
# Static Cache: adapter-node setzt für /_app/immutable/* (gehashte Chunks) bereits
#   Cache-Control: public, max-age=31536000, immutable
# — Header vom Upstream durchreichen. Kein langes Caching für HTML oder /_app/version.json
# erzwingen; siehe docs/betrieb.md („Cache: fingerprintete Static Assets“).

upstream packforge_node {
	server 127.0.0.1:3000;
	keepalive 32;
}

server {
	# HTTP/2 über TLS (Browser multiplexen viele Assets über eine Verbindung)
	listen 443 ssl http2;
	server_name packforge.example.org;

	# ssl_certificate ...;
	# ssl_certificate_key ...;

	# --- Kompression für Text-Assets und JSON-API ---
	gzip on;
	gzip_vary on;
	gzip_comp_level 5;
	gzip_min_length 256;
	gzip_proxied any;
	gzip_types
		application/javascript
		application/json
		application/manifest+json
		application/xml
		font/woff2
		image/svg+xml
		text/css
		text/javascript
		text/plain
		text/xml;

	# Optional (Modul ngx_brotli):
	# brotli on;
	# brotli_comp_level 5;
	# brotli_types text/plain text/css application/javascript application/json image/svg+xml;

	location / {
		proxy_pass http://packforge_node;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Connection "";
	}
}
