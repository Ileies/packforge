# JS-Analyse ohne Build-Schritt; Repository-Root = SvelteKit-App.
name: CodeQL (PackForge)

on:
  push:
    paths:
      - 'src/**'
      - '.github/workflows/packforge-codeql.yml'
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/packforge-codeql.yml'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
